<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave a Review — PBNZ Barbers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #111111;
      --surface: #1a1a1a;
      --accent: #c9a84c;
      --accent-light: #e2c170;
      --text: #f0ece4;
      --text-muted: #a09888;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--primary); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 2.5rem; letter-spacing: -0.02em; }
    .logo span { color: var(--accent-light); }
    .card { background: var(--surface); border: 1px solid rgba(201,168,76,0.15); border-radius: var(--radius); padding: 3rem 2.5rem; max-width: 520px; width: 100%; text-align: center; }
    .card h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.75rem; line-height: 1.2; }
    .card p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.7; margin-bottom: 2rem; }
    .rating-label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
    .stars-row { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 2rem; }
    .star-btn { font-size: 2.5rem; background: none; border: none; cursor: pointer; transition: transform 0.15s; filter: grayscale(1) opacity(0.4); }
    .star-btn:hover, .star-btn.active { filter: none; transform: scale(1.15); }
    .btn { display: inline-block; background: var(--accent); color: #111; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; transition: all 0.2s; width: 100%; text-align: center; border: none; cursor: pointer; }
    .btn:hover { background: var(--accent-light); transform: translateY(-2px); }
    .btn-private { background: transparent; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); font-size: 0.88rem; margin-top: 1rem; padding: 0.75rem 1.5rem; }
    .btn-private:hover { border-color: var(--accent); color: var(--accent); background: transparent; transform: none; }
    .divider { color: var(--text-muted); font-size: 0.85rem; margin: 1rem 0; }
  </style>
</head>
<body>
  <div class="logo">PBNZ<span>.</span>Barbers</div>
  <div class="card">
    <h1>How Was Your Cut?</h1>
    <p>Your feedback means the world to us. If you had a great experience, please take 30 seconds to leave us a Google review — it helps other locals find us.</p>
    <div class="rating-label">How would you rate your visit?</div>
    <div class="stars-row" id="starsRow">
      <button class="star-btn" data-val="1" onclick="handleStar(1)">⭐</button>
      <button class="star-btn" data-val="2" onclick="handleStar(2)">⭐</button>
      <button class="star-btn" data-val="3" onclick="handleStar(3)">⭐</button>
      <button class="star-btn" data-val="4" onclick="handleStar(4)">⭐</button>
      <button class="star-btn" data-val="5" onclick="handleStar(5)">⭐</button>
    </div>
    <div id="actionArea">
      <p style="color:var(--text-muted);font-size:0.88rem;">Select your rating above</p>
    </div>
  </div>
  <script>
    function handleStar(val) {
      const btns = document.querySelectorAll('.star-btn');
      btns.forEach((b, i) => b.classList.toggle('active', i < val));
      const area = document.getElementById('actionArea');
      if (val >= 4) {
        area.innerHTML = `<a href="https://g.page/r/review" target="_blank" class="btn">Leave a Google Review ⭐</a>`;
      } else {
        area.innerHTML = `<p style="color:var(--text-muted);font-size:0.92rem;margin-bottom:1rem;">We're sorry to hear that. We'd love to make it right — please share your feedback privately.</p><a href="private.html" class="btn btn-private">Share Private Feedback</a>`;
      }
    }
  </script>
</body>
</html>
